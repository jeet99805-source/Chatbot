<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Universal AI Assistant</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>

body{
font-family:Inter,system-ui;
background:linear-gradient(180deg,#ffffff,#f3f4ff);
height:100vh;
overflow:hidden;
}

.sidebar{
width:260px;
background:white;
border-right:1px solid #e5e7eb;
}

.fade-in{
animation:fade .3s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(8px)}
to{opacity:1;transform:translateY(0)}
}

.message-user{
background:linear-gradient(135deg,#6366f1,#8b5cf6);
color:white;
padding:12px;
border-radius:18px;
max-width:70%;
}

.message-ai{
background:white;
padding:12px;
border-radius:18px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
max-width:70%;
}

.logo{
width:48px;
height:48px;
border-radius:16px;
background:linear-gradient(135deg,#6366f1,#8b5cf6);
}

.inputbox{
border-radius:16px;
box-shadow:0 10px 25px rgba(0,0,0,.08);
}

</style>
</head>

<body class="flex">

<div id="loading" class="fixed inset-0 flex items-center justify-center bg-white z-50">
Loading App...
</div>

<!-- SIDEBAR -->

<div class="sidebar flex flex-col p-4">

<div class="flex justify-between items-center mb-4">

<h1 class="font-bold">AI Chat</h1>

<button onclick="openSettings()">⚙</button>

</div>

<button onclick="newChat()" class="bg-indigo-600 text-white p-2 rounded mb-4">
+ New Chat
</button>

<div id="chatList" class="flex-1 overflow-y-auto text-sm"></div>

</div>

<!-- MAIN -->

<div class="flex-1 flex flex-col">

<!-- HEADER -->

<div class="p-4 border-b bg-white flex items-center gap-3">

<div class="logo"></div>

<h2 class="font-semibold">
Universal AI Assistant
</h2>

</div>

<!-- CHAT -->

<div id="chatArea" class="flex-1 overflow-y-auto p-6 space-y-4">

<div id="welcome" class="text-center mt-24">

<div class="logo mx-auto mb-6"></div>

<h2 class="text-3xl font-semibold text-gray-700">
Hello, User
</h2>

<p class="text-gray-500 mt-2">
How can I help you today?
</p>

</div>

</div>

<!-- INPUT -->

<div class="p-4 border-t bg-white">

<div class="flex gap-2">

<button onclick="document.getElementById('fileInput').click()">
📎
</button>

<input id="fileInput" type="file" hidden>

<input
id="messageInput"
class="flex-1 border p-3 inputbox"
placeholder="Ask anything..."
>

<button
onclick="sendMessage()"
class="bg-indigo-600 text-white px-4 rounded"
>
Send
</button>

</div>

</div>

</div>

<!-- SETTINGS -->

<div
id="settingsModal"
class="hidden fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center"
>

<div class="bg-white p-6 rounded w-80 space-y-4">

<h2 class="font-bold text-lg">
Settings
</h2>

<input
id="apiKey"
class="border p-2 w-full"
placeholder="OpenRouter API Key"
>

<input
id="modelName"
class="border p-2 w-full"
value="deepseek/deepseek-r1:free"
>

<textarea
id="systemPrompt"
class="border p-2 w-full"
rows="4"
placeholder="System Prompt"
></textarea>

<button
onclick="saveSettings()"
class="bg-indigo-600 text-white w-full p-2 rounded"
>
Save
</button>

<button
onclick="closeSettings()"
class="w-full border p-2 rounded"
>
Close
</button>

</div>

</div>

<script>

const API_URL="https://openrouter.ai/api/v1/chat/completions"

let currentChat=[]

function newChat(){
currentChat=[]
renderChat()
}

function renderChat(){

const area=document.getElementById("chatArea")
const welcome=document.getElementById("welcome")

if(currentChat.length>0) welcome.style.display="none"

area.innerHTML=""

currentChat.forEach(m=>{

const div=document.createElement("div")

div.className="fade-in "+(m.role==="user"
?"message-user ml-auto"
:"message-ai")

div.innerHTML=marked.parse(m.content)

area.appendChild(div)

})

area.scrollTop=area.scrollHeight

}

async function sendMessage(){

const input=document.getElementById("messageInput")

const text=input.value.trim()

if(!text)return

input.value=""

currentChat.push({role:"user",content:text})

renderChat()

const apiKey=localStorage.getItem("apiKey")

const model=localStorage.getItem("model")||"deepseek/deepseek-r1:free"

if(!apiKey){
alert("Add API key in settings")
return
}

const aiMsg={role:"assistant",content:"Thinking..."}

currentChat.push(aiMsg)

renderChat()

try{

const res=await fetch(API_URL,{
method:"POST",
headers:{
"Authorization":"Bearer "+apiKey,
"Content-Type":"application/json"
},
body:JSON.stringify({
model:model,
messages:currentChat
})
})

const data=await res.json()

aiMsg.content=data.choices[0].message.content

renderChat()

}catch(e){

aiMsg.content="Network error"

renderChat()

}

}

function openSettings(){

document.getElementById("settingsModal").classList.remove("hidden")

document.getElementById("apiKey").value=
localStorage.getItem("apiKey")||""

document.getElementById("modelName").value=
localStorage.getItem("model")||"deepseek/deepseek-r1:free"

document.getElementById("systemPrompt").value=
localStorage.getItem("systemPrompt")||""

}

function closeSettings(){

document.getElementById("settingsModal").classList.add("hidden")

}

function saveSettings(){

localStorage.setItem(
"apiKey",
document.getElementById("apiKey").value
)

localStorage.setItem(
"model",
document.getElementById("modelName").value
)

localStorage.setItem(
"systemPrompt",
document.getElementById("systemPrompt").value
)

closeSettings()

}

document.getElementById("loading").style.display="none"

</script>

</body>
</html>
