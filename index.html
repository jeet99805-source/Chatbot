<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Universal AI Chat</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>

html,body{
height:100%;
}

#loading{
position:fixed;
top:0;
left:0;
right:0;
bottom:0;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
background:white;
z-index:9999;
}

.dark #loading{
background:#111;
color:white;
}

.message pre{
background:#111;
color:#fff;
padding:10px;
border-radius:8px;
overflow:auto;
}

.sidebar-transition{
transition:transform .25s ease;
}

</style>
</head>

<body class="bg-gray-100 dark:bg-gray-900">

<div id="loading">Loading App...</div>

<div id="app" class="hidden flex h-[100dvh]">

<!-- Sidebar -->
<div id="sidebar"
class="sidebar-transition fixed md:relative z-30 w-72 bg-white dark:bg-gray-800 border-r border-gray-200 dark:border-gray-700 transform -translate-x-full md:translate-x-0 flex flex-col">

<div class="p-4 flex justify-between items-center border-b dark:border-gray-700">

<button id="newChatBtn" class="px-3 py-1 bg-blue-500 text-white rounded">New</button>

<button id="closeSidebar" class="md:hidden">✕</button>

</div>

<div id="chatList" class="flex-1 overflow-y-auto"></div>

<div class="p-4 space-y-2 border-t dark:border-gray-700">

<button id="settingsBtn" class="w-full bg-gray-200 dark:bg-gray-700 p-2 rounded">
Settings
</button>

<button id="darkToggle" class="w-full bg-gray-200 dark:bg-gray-700 p-2 rounded">
Toggle Dark
</button>

</div>

</div>


<!-- Main Area -->

<div class="flex-1 flex flex-col">

<div class="p-3 border-b bg-white dark:bg-gray-800 flex items-center gap-3">

<button id="openSidebar" class="md:hidden text-xl">☰</button>

<div id="chatTitle" class="font-semibold">Chat</div>

</div>


<!-- Messages -->

<div id="messages"
class="flex-1 overflow-y-auto p-4 space-y-4"></div>


<!-- Input -->

<div class="p-3 border-t bg-white dark:bg-gray-800">

<div class="flex gap-2">

<textarea
id="prompt"
rows="1"
class="flex-1 p-2 border rounded resize-none dark:bg-gray-700"
placeholder="Send a message"></textarea>

<button id="sendBtn"
class="px-4 py-2 bg-blue-600 text-white rounded">
Send
</button>

</div>

</div>

</div>

</div>


<!-- Settings Modal -->

<div id="settingsModal"
class="hidden fixed inset-0 bg-black/40 flex items-center justify-center">

<div class="bg-white dark:bg-gray-800 p-6 rounded w-96 space-y-4">

<h2 class="font-bold text-lg">Settings</h2>

<div>
<label>OpenRouter API Key</label>
<input id="apiKey" type="password" class="w-full border p-2 rounded">
</div>

<div>
<label>Model</label>
<input id="modelName" class="w-full border p-2 rounded"
value="deepseek/deepseek-r1:free">
</div>

<div>
<label>System Prompt</label>
<textarea id="systemPrompt" class="w-full border p-2 rounded"></textarea>
</div>

<div class="flex justify-end gap-2">

<button id="saveSettings"
class="px-4 py-2 bg-blue-600 text-white rounded">Save</button>

<button id="closeSettings"
class="px-4 py-2 bg-gray-400 text-white rounded">Close</button>

</div>

</div>

</div>


<script>

(function(){

const $ = id=>document.getElementById(id)

let chats=[]
let currentChat=null

function safeParse(v){
try{return JSON.parse(v)}catch{ return null }
}

function loadState(){

const saved = safeParse(localStorage.getItem("ai_chats"))
if(saved) chats=saved

const dark = localStorage.getItem("dark_mode")
if(dark==="true") document.documentElement.classList.add("dark")

$("apiKey").value=localStorage.getItem("api_key")||""
$("modelName").value=localStorage.getItem("model_name")||"deepseek/deepseek-r1:free"
$("systemPrompt").value=localStorage.getItem("system_prompt")||""

}

function saveState(){
localStorage.setItem("ai_chats",JSON.stringify(chats))
}

function newChat(){

const chat={
id:Date.now(),
title:"New Chat",
messages:[]
}

chats.unshift(chat)
currentChat=chat.id

saveState()
renderChats()
renderMessages()

}

function renderChats(){

const list=$("chatList")
list.innerHTML=""

chats.forEach(c=>{

const el=document.createElement("div")
el.className="p-3 hover:bg-gray-200 dark:hover:bg-gray-700 cursor-pointer flex justify-between"

const title=document.createElement("span")
title.textContent=c.title

title.onclick=()=>{
currentChat=c.id
renderMessages()
}

const del=document.createElement("button")
del.textContent="🗑"
del.onclick=(e)=>{
e.stopPropagation()
chats=chats.filter(x=>x.id!==c.id)
saveState()
renderChats()
renderMessages()
}

el.appendChild(title)
el.appendChild(del)

list.appendChild(el)

})

}

function renderMessages(){

const box=$("messages")
box.innerHTML=""

const chat=chats.find(c=>c.id===currentChat)
if(!chat) return

chat.messages.forEach(m=>{

const div=document.createElement("div")

div.className="message max-w-xl p-3 rounded"

if(m.role==="user"){
div.className+=" bg-blue-500 text-white ml-auto"
div.textContent=m.content
}else{
div.className+=" bg-gray-200 dark:bg-gray-700"
div.innerHTML=marked.parse(m.content)
}

box.appendChild(div)

})

box.scrollTop=box.scrollHeight

}

async function sendMessage(){

const prompt=$("prompt").value.trim()
if(!prompt) return

$("prompt").value=""

const chat=chats.find(c=>c.id===currentChat)
if(!chat) return

chat.messages.push({role:"user",content:prompt})

renderMessages()

const aiMsg={role:"assistant",content:""}
chat.messages.push(aiMsg)

renderMessages()

saveState()

try{

const res=await fetch("https://openrouter.ai/api/v1/chat/completions",{

method:"POST",
headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+localStorage.getItem("api_key")
},

body:JSON.stringify({

model:localStorage.getItem("model_name")||"deepseek/deepseek-r1:free",

messages:[
{role:"system",content:localStorage.getItem("system_prompt")||""},
...chat.messages
],

stream:true

})

})

if(!res.body) throw new Error("No stream")

const reader=res.body.getReader()
const decoder=new TextDecoder()

while(true){

const {done,value}=await reader.read()
if(done) break

const chunk=decoder.decode(value)

chunk.split("\n").forEach(line=>{

if(line.startsWith("data: ")){

const data=line.replace("data: ","")

if(data==="[DONE]") return

try{

const json=JSON.parse(data)
const token=json.choices?.[0]?.delta?.content

if(token){

aiMsg.content+=token
renderMessages()

}

}catch{}

}

})

}

saveState()

}catch(e){

aiMsg.content+="\n\n⚠️ Error contacting API"
renderMessages()

}

}

function initUI(){

$("newChatBtn").onclick=newChat
$("sendBtn").onclick=sendMessage

$("openSidebar").onclick=()=>{
$("sidebar").classList.remove("-translate-x-full")
}

$("closeSidebar").onclick=()=>{
$("sidebar").classList.add("-translate-x-full")
}

$("settingsBtn").onclick=()=>{
$("settingsModal").classList.remove("hidden")
}

$("closeSettings").onclick=()=>{
$("settingsModal").classList.add("hidden")
}

$("saveSettings").onclick=()=>{

localStorage.setItem("api_key",$("apiKey").value)
localStorage.setItem("model_name",$("modelName").value)
localStorage.setItem("system_prompt",$("systemPrompt").value)

$("settingsModal").classList.add("hidden")

}

$("darkToggle").onclick=()=>{
document.documentElement.classList.toggle("dark")
localStorage.setItem("dark_mode",document.documentElement.classList.contains("dark"))
}

}

function boot(){

loadState()

if(chats.length===0) newChat()

currentChat=chats[0].id

renderChats()
renderMessages()

initUI()

$("loading").style.display="none"
$("app").classList.remove("hidden")

}

document.addEventListener("DOMContentLoaded",boot)

})()

</script>

</body>
</html>
