<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Chat</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family: 'Inter', sans-serif;
background:#0f172a;
}

.message{
animation:fade .3s ease;
}

@keyframes fade{
from{opacity:0; transform:translateY(10px);}
to{opacity:1; transform:translateY(0);}
}

.user{
background:linear-gradient(135deg,#2563eb,#06b6d4);
color:white;
border-radius:18px;
padding:12px 16px;
margin-left:auto;
max-width:70%;
box-shadow:0 10px 20px rgba(0,0,0,.25);
}

.ai{
background:#1e293b;
color:white;
border-radius:18px;
padding:12px 16px;
max-width:70%;
box-shadow:0 10px 20px rgba(0,0,0,.25);
}

</style>

</head>

<body class="h-screen flex">

<!-- Sidebar -->

<div class="w-64 bg-black/40 backdrop-blur-lg border-r border-gray-700 flex flex-col">

<div class="p-5 text-white text-xl font-semibold">
Universal AI Chat
</div>

<button class="mx-4 mb-4 p-2 bg-blue-600 text-white rounded-lg hover:bg-blue-500">
New Chat
</button>

</div>

<!-- Chat Area -->

<div class="flex-1 flex flex-col">

<div id="messages" class="flex-1 overflow-y-auto p-6 space-y-4"></div>

<div class="p-4 border-t border-gray-700 flex gap-2">

<input id="input"
class="flex-1 p-3 rounded-xl bg-slate-800 text-white outline-none"
placeholder="Send a message...">

<button id="send"
class="px-5 py-3 rounded-xl bg-blue-600 text-white hover:bg-blue-500">
Send
</button>

</div>

</div>

<script>

const messages=document.getElementById("messages")
const input=document.getElementById("input")
const send=document.getElementById("send")

send.onclick=sendMessage
input.addEventListener("keypress",e=>{
if(e.key==="Enter") sendMessage()
})

function sendMessage(){

const text=input.value.trim()
if(!text) return

addMessage(text,"user")
input.value=""

setTimeout(()=>{
addMessage("AI response will appear here once connected.","ai")
},500)

}

function addMessage(text,type){

const div=document.createElement("div")
div.className="message "+type
div.innerText=text

messages.appendChild(div)
messages.scrollTop=messages.scrollHeight

}

</script>

</body>
</html>
