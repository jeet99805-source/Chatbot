<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Universal AI Chat</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>

body{
font-family:'Inter',sans-serif;
}

.chat-bubble-user{
background:linear-gradient(135deg,#2563eb,#06b6d4);
color:white;
padding:14px 16px;
border-radius:16px;
max-width:70%;
margin-left:auto;
}

.chat-bubble-ai{
background:#f3f4f6;
padding:14px 16px;
border-radius:16px;
max-width:70%;
}

.dark .chat-bubble-ai{
background:#1f2937;
color:white;
}

.fade{
animation:fade .25s ease;
}

@keyframes fade{
from{opacity:0;transform:translateY(10px)}
to{opacity:1;transform:translateY(0)}
}

</style>

</head>

<body class="bg-gray-100 dark:bg-gray-900 h-screen flex">

<div class="flex flex-col w-full">

<div class="flex items-center justify-between p-4 border-b bg-white dark:bg-gray-800">

<h1 class="text-lg font-semibold text-gray-700 dark:text-white">
Universal AI Chat
</h1>

<button id="themeBtn" class="px-3 py-1 rounded bg-gray-200 dark:bg-gray-700">
Toggle Theme
</button>

</div>

<div id="messages" class="flex-1 overflow-y-auto p-6 space-y-4"></div>

<div class="p-4 border-t bg-white dark:bg-gray-800 flex gap-2">

<input id="prompt"
class="flex-1 p-3 rounded-lg border dark:bg-gray-700 dark:text-white"
placeholder="Send a message...">

<button id="sendBtn"
class="px-5 py-3 rounded-lg bg-blue-600 text-white">
Send
</button>

</div>

</div>

<script>

const API_URL="https://openrouter.ai/api/v1/chat/completions"

let API_KEY=localStorage.getItem("api_key")||""
let MODEL=localStorage.getItem("model_name")||"z-ai/glm-4.5-air:free"

if(!API_KEY){
API_KEY=prompt("Enter your OpenRouter API Key")
localStorage.setItem("api_key",API_KEY)
}

const messagesDiv=document.getElementById("messages")
const promptInput=document.getElementById("prompt")
const sendBtn=document.getElementById("sendBtn")

let history=[]

function addMessage(text,type){

const div=document.createElement("div")

div.className="fade "+(type==="user"?"chat-bubble-user":"chat-bubble-ai")

div.innerText=text

messagesDiv.appendChild(div)

messagesDiv.scrollTop=messagesDiv.scrollHeight

}

async function sendMessage(){

const text=promptInput.value.trim()

if(!text)return

addMessage(text,"user")

history.push({role:"user",content:text})

promptInput.value=""

const thinking=document.createElement("div")

thinking.className="chat-bubble-ai"

thinking.innerText="Thinking..."

messagesDiv.appendChild(thinking)

try{

const res=await fetch(API_URL,{

method:"POST",

headers:{
"Content-Type":"application/json",
"Authorization":"Bearer "+API_KEY
},

body:JSON.stringify({

model:MODEL,

messages:history

})

})

const data=await res.json()

const reply=data.choices?.[0]?.message?.content||"No response"

thinking.innerText=reply

history.push({role:"assistant",content:reply})

}catch(e){

thinking.innerText="Error contacting AI"

}

messagesDiv.scrollTop=messagesDiv.scrollHeight

}

sendBtn.onclick=sendMessage

promptInput.addEventListener("keypress",e=>{
if(e.key==="Enter")sendMessage()
})

document.getElementById("themeBtn").onclick=()=>{
document.documentElement.classList.toggle("dark")
}

</script>

</body>
</html>
