```html
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Learning Assistant</title>

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

<style>
body{font-family:Inter,system-ui;background:#0f172a;color:white}
.sidebar{width:260px}
.message-user{background:linear-gradient(135deg,#06b6d4,#2563eb)}
.message-ai{background:#1e293b}
</style>
</head>

<body class="h-screen flex overflow-hidden">

<!-- SIDEBAR -->
<div class="sidebar bg-slate-900 p-4 flex flex-col">
<div class="flex justify-between items-center mb-4">
<h1 class="font-bold">AI Chat</h1>
<button onclick="openSettings()">⚙</button>
</div>

<button onclick="newChat()" class="bg-blue-600 p-2 rounded mb-4">New Chat</button>

<div id="chatList" class="flex-1 overflow-auto text-sm"></div>
</div>

<!-- MAIN -->
<div class="flex-1 flex flex-col">

<!-- HEADER -->
<div class="p-4 border-b border-slate-700 flex justify-between">
<div>Universal AI Assistant</div>
<div class="space-x-2">
<button onclick="toggleTheme()">🌓</button>
<button onclick="openSettings()">⚙</button>
</div>
</div>

<!-- MESSAGES -->
<div id="messages" class="flex-1 overflow-auto p-6 space-y-4"></div>

<!-- INPUT -->
<div class="border-t border-slate-700 p-4 flex gap-2">

<input id="imageInput" type="file" accept="image/*" class="hidden" onchange="uploadImage()">

<button onclick="document.getElementById('imageInput').click()" class="px-3 bg-slate-700 rounded">📷</button>

<textarea id="promptInput" rows="1" class="flex-1 bg-slate-800 p-3 rounded resize-none" placeholder="Ask something..."></textarea>

<button onclick="sendMessage()" class="bg-blue-600 px-4 rounded">Send</button>

</div>

</div>


<!-- SETTINGS MODAL -->
<div id="settingsModal" class="hidden fixed inset-0 bg-black/70 flex items-center justify-center">

<div class="bg-slate-900 p-6 rounded-xl w-96 space-y-3">

<h2 class="text-lg font-bold">Settings</h2>

<input id="apiKey" placeholder="OpenRouter API Key" class="w-full p-2 rounded bg-slate-800">

<input id="modelName" value="deepseek/deepseek-chat:free" class="w-full p-2 rounded bg-slate-800">

<textarea id="systemPrompt" rows="4" class="w-full p-2 rounded bg-slate-800"
placeholder="System Prompt"></textarea>

<div class="flex justify-end gap-2">
<button onclick="saveSettings()" class="bg-blue-600 px-3 py-1 rounded">Save</button>
<button onclick="closeSettings()" class="bg-slate-700 px-3 py-1 rounded">Close</button>
</div>

</div>
</div>



<script>

let messages=[]
let chats=[]
let currentChat=0

function openSettings(){
document.getElementById("settingsModal").classList.remove("hidden")
}

function closeSettings(){
document.getElementById("settingsModal").classList.add("hidden")
}

function saveSettings(){
localStorage.apiKey=document.getElementById("apiKey").value
localStorage.model=document.getElementById("modelName").value
localStorage.systemPrompt=document.getElementById("systemPrompt").value
closeSettings()
}

function newChat(){
messages=[]
renderMessages()
}

function renderMessages(){
let container=document.getElementById("messages")
container.innerHTML=""

messages.forEach(m=>{
let div=document.createElement("div")

div.className="p-3 rounded max-w-xl "+(m.role=="user"?"message-user ml-auto":"message-ai")

div.innerHTML=marked.parse(m.content)

container.appendChild(div)
})

container.scrollTop=container.scrollHeight
}

async function sendMessage(){

let input=document.getElementById("promptInput")
let text=input.value.trim()

if(!text)return

messages.push({role:"user",content:text})
renderMessages()

input.value=""

messages.push({role:"assistant",content:"Thinking..."})
renderMessages()

let apiKey=localStorage.apiKey
let model=localStorage.model||"deepseek/deepseek-chat:free"
let systemPrompt=localStorage.systemPrompt||"You are a helpful AI tutor."

let body={
model:model,
messages:[
{role:"system",content:systemPrompt},
...messages
],
stream:true
}

let response=await fetch("https://openrouter.ai/api/v1/chat/completions",{
method:"POST",
headers:{
"Authorization":"Bearer "+apiKey,
"Content-Type":"application/json"
},
body:JSON.stringify(body)
})

let reader=response.body.getReader()
let decoder=new TextDecoder()

messages[messages.length-1].content=""

while(true){

const {done,value}=await reader.read()

if(done)break

let chunk=decoder.decode(value)

let lines=chunk.split("\n")

for(let line of lines){

if(line.startsWith("data:")){

let json=line.replace("data:","").trim()

if(json==="[DONE]")break

try{
let obj=JSON.parse(json)
let token=obj.choices[0].delta?.content||""
messages[messages.length-1].content+=token
renderMessages()
}catch(e){}
}
}
}

}

function uploadImage(){

let file=document.getElementById("imageInput").files[0]

if(!file)return

let reader=new FileReader()

reader.onload=function(){

messages.push({
role:"user",
content:`![image](${reader.result})`
})

renderMessages()

}

reader.readAsDataURL(file)

}

function toggleTheme(){
document.body.classList.toggle("bg-white")
document.body.classList.toggle("text-black")
}

</script>

</body>
</html>
